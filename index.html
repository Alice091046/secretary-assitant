<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>秘书助手办公室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .office-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        
        .office-header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .office-scene {
            height: 300px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FF 100%);
            position: relative;
            overflow: hidden;
        }
        
        .desk {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: #8B4513;
        }
        
        .computer {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            background: #333;
            border-radius: 10px;
        }
        
        .screen {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: #00ff00;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .pixel-character {
            position: absolute;
            bottom: 100px;
            left: 40%;
            width: 40px;
            height: 60px;
            transition: all 0.5s ease;
        }
        
        .pixel-body {
            width: 40px;
            height: 40px;
            background: #3498db;
            position: absolute;
            top: 0;
            border-radius: 5px;
        }
        
        .pixel-head {
            width: 30px;
            height: 20px;
            background: #f1c40f;
            position: absolute;
            top: -20px;
            left: 5px;
            border-radius: 10px 10px 5px 5px;
        }
        
        .status-panel {
            padding: 20px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
        }
        
        .status-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-label {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .status-value {
            color: #3498db;
            font-weight: 500;
        }
        
        .typing-animation {
            animation: typing 1s infinite;
        }
        
        .thinking-animation {
            animation: thinking 2s infinite;
        }
        
        @keyframes typing {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(1deg); }
            50% { transform: translateY(-5px) rotate(0deg); }
            75% { transform: translateY(-3px) rotate(-1deg); }
        }
        
        @keyframes thinking {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        
        .developing {
            background: #9b59b6 !important;
        }
        
        .idle {
            background: #95a5a6 !important;
        }
        
        .coffee-cup {
            position: absolute;
            bottom: 90px;
            right: 30%;
            width: 20px;
            height: 25px;
            background: #e74c3c;
            border-radius: 5px 5px 0 0;
            display: none;
        }
        
        @media (max-width: 480px) {
            .office-container {
                border-radius: 10px;
            }
            
            .office-scene {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="office-container">
        <div class="office-header">
            <h1>🤖 秘书助手办公室</h1>
            <p>实时工作状态监控</p>
        </div>
        
        <div class="office-scene">
            <div class="desk"></div>
            <div class="computer">
                <div class="screen"></div>
            </div>
            
            <div class="pixel-character" id="character">
                <div class="pixel-head"></div>
                <div class="pixel-body"></div>
            </div>
            
            <div class="coffee-cup" id="coffeeCup"></div>
        </div>
        
        <div class="status-panel">
            <div class="status-item">
                <span class="status-label">当前状态：</span>
                <span class="status-value" id="currentStatus">工作中</span>
            </div>
            <div class="status-item">
                <span class="status-label">今日任务：</span>
                <span class="status-value" id="todayTasks">开发小组件</span>
            </div>
            <div class="status-item">
                <span class="status-label">在线时长：</span>
                <span class="status-value" id="onlineTime">2小时15分</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后活跃：</span>
                <span class="status-value" id="lastActive">刚刚</span>
            </div>
        </div>
    </div>

    <script>
        // 状态映射
        const stateMapping = {
            '空闲': 'idle',
            '处理消息中': 'working',
            '打字回复中': 'typing',
            '思考中': 'thinking',
            '开发小组件中': 'developing',
            '休息中': 'resting'
        };
        
        const stateClasses = {
            'idle': { class: 'idle', text: '空闲中', left: '35%' },
            'working': { class: 'working', text: '工作中', left: '40%' },
            'typing': { class: 'typing', text: '打字中', left: '45%' },
            'thinking': { class: 'thinking', text: '思考中', left: '50%' },
            'developing': { class: 'developing', text: '开发中', left: '55%' },
            'resting': { class: 'resting', text: '休息中', left: '30%' }
        };
        
        let currentState = 'working';
        let lastUpdate = new Date();
        
        // 从API获取真实状态
        async function fetchRealStatus() {
            try {
                // 尝试连接本地API
                const response = await fetch('http://localhost:3000/api/status');
                if (response.ok) {
                    const data = await response.json();
                    return data.data;
                }
            } catch (error) {
                console.log('使用模拟数据');
            }
            
            // 如果API不可用，使用模拟数据
            return getMockStatus();
        }
        
        // 模拟状态生成
        function getMockStatus() {
            const now = new Date();
            const hour = now.getHours();
            let state, task;
            
            if (hour >= 9 && hour < 12) {
                state = Math.random() > 0.3 ? '处理消息中' : '打字回复中';
                task = '处理飞书消息';
            } else if (hour >= 12 && hour < 14) {
                state = Math.random() > 0.5 ? '休息中' : '思考中';
                task = '计划任务';
            } else if (hour >= 14 && hour < 18) {
                state = '开发小组件中';
                task = '开发可视化小组件';
            } else if (hour >= 18 && hour < 22) {
                state = '思考中';
                task = '学习优化';
            } else {
                state = Math.random() > 0.7 ? '处理消息中' : '空闲';
                task = '系统维护';
            }
            
            return {
                state: state,
                task: task,
                timestamp: now.toISOString(),
                online: true,
                messageCount: Math.floor(Math.random() * 50) + 10
            };
        }
        
        // 更新状态显示
        async function updateStatus() {
            const now = new Date();
            const diff = Math.floor((now - lastUpdate) / 1000);
            
            // 更新最后活跃时间
            if (diff < 60) {
                document.getElementById('lastActive').textContent = '刚刚';
            } else if (diff < 3600) {
                document.getElementById('lastActive').textContent = `${Math.floor(diff/60)}分钟前`;
            } else {
                document.getElementById('lastActive').textContent = `${Math.floor(diff/3600)}小时前`;
            }
            
            // 获取真实或模拟状态
            const statusData = await fetchRealStatus();
            const stateKey = stateMapping[statusData.state] || 'working';
            
            // 设置状态
            setState(stateKey, statusData.task);
            
            // 更新在线时间
            const onlineHours = Math.floor(process.uptime ? process.uptime() / 3600 : 2);
            const onlineMinutes = Math.floor((process.uptime ? process.uptime() % 3600 : 1200) / 60);
            document.getElementById('onlineTime').textContent = 
                `${onlineHours}小时${onlineMinutes}分`;
                
            // 更新消息计数
            if (statusData.messageCount) {
                document.getElementById('todayTasks').textContent = 
                    `${statusData.task} (${statusData.messageCount}条消息)`;
            }
        }
        
        // 设置状态
        function setState(stateKey, task = '') {
            currentState = stateKey;
            const character = document.getElementById('character');
            const coffeeCup = document.getElementById('coffeeCup');
            const statusText = document.getElementById('currentStatus');
            
            // 获取状态配置
            const stateConfig = stateClasses[stateKey] || stateClasses.working;
            
            // 移除所有动画类
            character.classList.remove('typing-animation', 'thinking-animation');
            
            // 设置位置和文本
            character.style.left = stateConfig.left;
            statusText.textContent = stateConfig.text;
            
            // 根据状态设置动画和咖啡杯
            if (stateKey === 'typing') {
                character.classList.add('typing-animation');
                coffeeCup.style.display = 'none';
            } else if (stateKey === 'thinking') {
                character.classList.add('thinking-animation');
                coffeeCup.style.display = 'none';
            } else if (stateKey === 'resting') {
                coffeeCup.style.display = 'block';
                character.style.animation = 'none';
            } else if (stateKey === 'developing') {
                character.style.animation = 'typing 1.5s infinite';
                coffeeCup.style.display = 'none';
            } else {
                character.style.animation = 'none';
                coffeeCup.style.display = 'none';
            }
            
            // 更新任务显示
            if (task) {
                document.getElementById('todayTasks').textContent = task;
            }
            
            lastUpdate = new Date();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 每10秒更新一次状态
            setInterval(updateStatus, 10000);
            
            // 初始状态
            setState(states.WORKING);
            
            // 模拟任务更新
            const tasks = [
                '开发小组件',
                '处理消息',
                '整理文档',
                '学习新技能',
                '优化系统'
            ];
            
            setInterval(() => {
                const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
                document.getElementById('todayTasks').textContent = randomTask;
            }, 30000);
        });
        
        // 触摸交互
        document.getElementById('character').addEventListener('click', function() {
            const statesList = Object.values(states);
            const nextState = statesList[(statesList.indexOf(currentState) + 1) % statesList.length];
            setState(nextState);
        });
    </script>
</body>
</html>
