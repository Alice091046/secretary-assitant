<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘书助手形象设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: 20px;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .design-section {
            margin-bottom: 40px;
        }
        
        .section-title {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .character-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .character-card.selected {
            border-color: #3498db;
            background: #e3f2fd;
        }
        
        .character-name {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .character-desc {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 15px;
            min-height: 60px;
        }
        
        .pixel-display {
            width: 100px;
            height: 120px;
            margin: 0 auto 15px;
            position: relative;
            image-rendering: pixelated;
        }
        
        /* 机器人风格 */
        .robot {
            background: #3498db;
            width: 60px;
            height: 80px;
            margin: 20px auto;
            border-radius: 10px;
            position: relative;
        }
        
        .robot::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 15px;
            width: 30px;
            height: 20px;
            background: #f1c40f;
            border-radius: 10px 10px 5px 5px;
        }
        
        .robot::after {
            content: '🤖';
            position: absolute;
            top: -25px;
            left: 20px;
            font-size: 20px;
        }
        
        /* 职业助手 */
        .professional {
            background: #2c3e50;
            width: 50px;
            height: 70px;
            margin: 25px auto;
            position: relative;
        }
        
        .professional::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 10px;
            width: 30px;
            height: 15px;
            background: #34495e;
            border-radius: 8px 8px 0 0;
        }
        
        .professional::after {
            content: '👔';
            position: absolute;
            top: -20px;
            left: 15px;
            font-size: 18px;
        }
        
        /* 数字精灵 */
        .digital-spirit {
            background: #9b59b6;
            width: 40px;
            height: 60px;
            margin: 30px auto;
            border-radius: 20px 20px 10px 10px;
            position: relative;
            animation: float 3s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .digital-spirit::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 10px;
            width: 20px;
            height: 10px;
            background: #8e44ad;
            border-radius: 10px;
        }
        
        .digital-spirit::after {
            content: '✨';
            position: absolute;
            top: -15px;
            left: 5px;
            font-size: 16px;
        }
        
        /* 可变形体 */
        .shapeshifter {
            width: 70px;
            height: 70px;
            margin: 25px auto;
            background: #1abc9c;
            border-radius: 50%;
            position: relative;
            animation: morph 4s infinite;
        }
        
        @keyframes morph {
            0% { border-radius: 50%; }
            25% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 20% 80% 80% 20% / 20% 20% 80% 80%; }
            75% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
            100% { border-radius: 50%; }
        }
        
        .shapeshifter::after {
            content: '🔄';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        
        /* 简约科技 */
        .minimal-tech {
            background: #e74c3c;
            width: 50px;
            height: 70px;
            margin: 25px auto;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            position: relative;
        }
        
        .minimal-tech::after {
            content: '⚡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
        }
        
        .vote-button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .vote-button:hover {
            background: #2980b9;
        }
        
        .selected-count {
            color: #27ae60;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #2ecc71;
            color: white;
        }
        
        .btn-primary:hover {
            background: #27ae60;
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .feedback-section {
            margin-top: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            resize: vertical;
            margin-top: 10px;
        }
        
        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>📋 选择指南：</strong> 点击选择您喜欢的形象，可以多选。选择后点击"确认选择"按钮。
    </div>
    
    <div class="container">
        <h1>秘书助手形象设计</h1>
        <p class="subtitle">请选择您喜欢的像素小人形象（可多选对比）</p>
        
        <div class="design-section">
            <h2 class="section-title">🤖 形象设计方案</h2>
            
            <div class="character-grid">
                <!-- 机器人风格 -->
                <div class="character-card" data-id="robot">
                    <div class="character-name">机器人助手</div>
                    <div class="pixel-display">
                        <div class="robot"></div>
                    </div>
                    <div class="character-desc">
                        经典机器人造型，科技感强，专业可靠。蓝色主题，黄色头部。
                    </div>
                    <button class="vote-button" onclick="selectCharacter('robot')">选择此形象</button>
                    <div class="selected-count" id="count-robot">0票</div>
                </div>
                
                <!-- 职业助手 -->
                <div class="character-card" data-id="professional">
                    <div class="character-name">职业秘书</div>
                    <div class="pixel-display">
                        <div class="professional"></div>
                    </div>
                    <div class="character-desc">
                        西装造型，专业严谨。深色系，适合正式工作场景。
                    </div>
                    <button class="vote-button" onclick="selectCharacter('professional')">选择此形象</button>
                    <div class="selected-count" id="count-professional">0票</div>
                </div>
                
                <!-- 数字精灵 -->
                <div class="character-card" data-id="digital-spirit">
                    <div class="character-name">数字精灵</div>
                    <div class="pixel-display">
                        <div class="digital-spirit"></div>
                    </div>
                    <div class="character-desc">
                        轻盈灵动的数字生命体。紫色主题，带有漂浮动画效果。
                    </div>
                    <button class="vote-button" onclick="selectCharacter('digital-spirit')">选择此形象</button>
                    <div class="selected-count" id="count-digital-spirit">0票</div>
                </div>
                
                <!-- 可变形体 -->
                <div class="character-card" data-id="shapeshifter">
                    <div class="character-name">可变形体</div>
                    <div class="pixel-display">
                        <div class="shapeshifter"></div>
                    </div>
                    <div class="character-desc">
                        根据任务变化形态。绿色主题，持续变形动画。
                    </div>
                    <button class="vote-button" onclick="selectCharacter('shapeshifter')">选择此形象</button>
                    <div class="selected-count" id="count-shapeshifter">0票</div>
                </div>
                
                <!-- 简约科技 -->
                <div class="character-card" data-id="minimal-tech">
                    <div class="character-name">简约科技</div>
                    <div class="pixel-display">
                        <div class="minimal-tech"></div>
                    </div>
                    <div class="character-desc">
                        极简几何造型，红色六边形。现代科技感，识别度高。
                    </div>
                    <button class="vote-button" onclick="selectCharacter('minimal-tech')">选择此形象</button>
                    <div class="selected-count" id="count-minimal-tech">0票</div>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="confirmSelection()">✅ 确认选择</button>
            <button class="btn btn-secondary" onclick="resetSelection()">🔄 重新选择</button>
        </div>
        
        <div class="feedback-section">
            <h2 class="section-title">💬 您的反馈</h2>
            <p>如果以上形象都不满意，请描述您期望的形象：</p>
            <textarea id="customFeedback" placeholder="例如：我想要一个更可爱的形象，有大眼睛和微笑..."></textarea>
            <button class="btn btn-primary" onclick="submitCustomDesign()" style="margin-top: 10px;">提交自定义需求</button>
        </div>
    </div>

    <script>
        let selectedCharacters = new Set();
        let voteCounts = {
            'robot': 0,
            'professional': 0,
            'digital-spirit': 0,
            'shapeshifter': 0,
            'minimal-tech': 0
        };
        
        function selectCharacter(characterId) {
            const card = document.querySelector(`[data-id="${characterId}"]`);
            
            if (selectedCharacters.has(characterId)) {
                // 取消选择
                selectedCharacters.delete(characterId);
                card.classList.remove('selected');
                voteCounts[characterId]--;
            } else {
                // 选择
                selectedCharacters.add(characterId);
                card.classList.add('selected');
                voteCounts[characterId]++;
            }
            
            // 更新计数显示
            document.getElementById(`count-${characterId}`).textContent = `${voteCounts[characterId]}票`;
            
            console.log('当前选择:', Array.from(selectedCharacters));
        }
        
        function confirmSelection() {
            if (selectedCharacters.size === 0) {
                alert('请至少选择一个形象！');
                return;
            }
            
            const selected = Array.from(selectedCharacters);
            let message = `您选择了 ${selected.length} 个形象：\n\n`;
            
            selected.forEach(id => {
                const name = document.querySelector(`[data-id="${id}"] .character-name`).textContent;
                message += `• ${name}\n`;
            });
            
            message += '\n我将基于这些选择进行设计。';
            alert(message);
            
            // 这里可以添加实际提交逻辑
            console.log('提交的选择:', selected);
        }
        
        function resetSelection() {
            selectedCharacters.clear();
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 重置计数
            Object.keys(voteCounts).forEach(id => {
                voteCounts[id] = 0;
                document.getElementById(`count-${id}`).textContent = '0票';
            });
            
            alert('选择已重置！');
        }
        
        function submitCustomDesign() {
            const feedback = document.getElementById('customFeedback').value.trim();
            if (!feedback) {
                alert('请描述您的自定义需求！');
                return;
            }
            
            alert(`已收到您的自定义需求：\n\n"${feedback}"\n\n我将根据此描述设计新形象。`);
            console.log('自定义需求:', feedback);
            
            // 清空输入框
            document.getElementById('customFeedback').value = '';
        }
        
        // 初始示例选择（机器人）
        selectCharacter('robot');
    </script>
</body>
</html>
